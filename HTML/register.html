<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Brilianz Warehouse</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

<nav>
    <div class="logo">Brilianz Warehouse</div>
    <div class="menu"></div>
</nav>

<section class="support-page">
    <div class="support-container">
        <h1>Create Account</h1>
        <p>Daftarkan akun untuk pesan produk di Brilianz Warehouse</p>

        <div class="support-form">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan Username">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Masukkan Email">

            <label for="password">Password</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="Masukkan Password" autocomplete="new-password">
                <button type="button" class="toggle-password" aria-label="Tampilkan password" aria-pressed="false"></button>
            </div>

            <label for="websiteId">Website ID (Opsional)</label>
            <input type="text" id="websiteId" placeholder="Masukkan Website ID">
            <p class="hint-text">Jika Anda tidak memiliki Website ID, biarkan kolom ini kosong.</p>

            <button class="btn btn-primary" style="width:100%" onclick="register()">Create Account</button>

            <div class="login-link">
                Sudah Memiliki Akun? <a href="login.html">Login</a>
            </div>
        </div>
    </div>
</section>

<script src="../JS/password-toggle.js"></script>
<script type="module">
import "../JS/navbar.js";
if (window.initNavbar) window.initNavbar();
</script>
<script type="module" src="../JS/register.js"></script>
</body>
</html>
