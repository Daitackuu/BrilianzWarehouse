<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Brilianz Warehouse</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

<nav>
    <div class="logo">Brilianz Warehouse</div>
    <div class="menu"></div>
</nav>

<section class="support-page">
    <div class="support-container">
        <h1>Customer Support</h1>
        <p>Butuh bantuan? Hubungi Admin Brilianz Warehouse melalui formulir di bawah ini.</p>

        <div class="support-form">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan Username">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Masukkan Email">

            <label for="pesan">Pesan</label>
            <textarea id="pesan" placeholder="Tulis pesan atau keluhan Anda..."></textarea>

            <button class="btn btn-primary" style="width:100%" onclick="kirimWhatsApp()">Kirim Pesan ke Admin</button>
        </div>
    </div>
</section>

<footer>
    <div class="footer-content">
        <h2>Brilianz Warehouse</h2>
        <p>Toko online produk premium terpercaya.</p>
        <div class="footer-links">
            <a href="../index.html">Home</a>
            <a href="produk.html">Produk</a>
            <a href="support.html">Support</a>
            <a href="login.html">Login</a>
        </div>
        <p class="copyright">&copy; 2026 Brilianz Warehouse. All rights reserved.</p>
    </div>
</footer>

<script type="module">
import "../JS/navbar.js";
if (window.initNavbar) window.initNavbar();
</script>

<script>
function kirimWhatsApp() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const pesan = document.getElementById("pesan").value.trim();

    if (username === "" || email === "" || pesan === "") {
        alert("Lengkapi semua data terlebih dahulu!");
        return;
    }

    const nomorAdmin = "6283853367309";
    const text = `Halo Admin Brilianz Warehouse\n\nUsername : ${username}\nEmail : ${email}\n\nPesan :\n${pesan}`;

    window.open(`https://wa.me/${nomorAdmin}?text=${encodeURIComponent(text)}`, "_blank");
    alert("Anda akan diarahkan ke WhatsApp Admin.");

    document.getElementById("username").value = "";
    document.getElementById("email").value = "";
    document.getElementById("pesan").value = "";
}
</script>
</body>
</html>
